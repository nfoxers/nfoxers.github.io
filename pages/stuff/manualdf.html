<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="manual diffie-hellman">
  <meta name="author" content="narada foxy">

  <link rel="stylesheet" href="/style/style.css">

  <title>manual diffie-hellman</title>

  <script src="/script/thstub.js"></script>
  <script type="module" src="/script/stuff/manualdf.js"></script>
</head>
<body>
  <div class="main">
    <div class="tbar">
      <p>manual diffie-hellman</p>
      <pre class="link2"><a href="/pages/stuff.html" data-i18n="back">back</a></pre>
    </div>
    
    <div class="dash"></div>
    <div class="sep"></div>
    <small id="err" data-i18n="err" style="display: none;">err: connection not secure, cryptographical libraries are disabled</small>
    <p data-i18n="dfpart">diffie hellman part</p>

    <pre><span data-i18n="publickey">your public key:</span> (<span id="clk" data-i18n="clk">click to copy</span>)</pre>
    <textarea class="sep" placeholder="your key" data-i18n-pl="yourkey" id="yk" style="cursor: pointer;" readonly></textarea>
    <textarea placeholder="their key" data-i18n-pl="theirkey" id="tk"></textarea>
    <button id="cf" class="sep" data-i18n="cf">confirm</button>
    <button id="reg" data-i18n="reg">regenerate</button>
    <div class="dash sep"></div>
    <p data-i18n="crpart">crypto part</p>
    <textarea placeholder="your message" data-i18n-pl="yourmsg" id="ym"></textarea>
    <textarea placeholder="their message" data-i18n-pl="theirmsg" id="tm"></textarea>
    <p id="out"></p>
    <button id="send" data-i18n="send">send</button>
    <button id="recv" data-i18n="recv">recieve</button>
    <br>
    <small class="sep" id="warn" data-i18n="warn">warn: keys not confirmed</small>

    <div class="sep"></div>
    
    <div id="log" class="log">
      <pre data-i18n="log">message log</pre>
    </div>
  </div>

  
</body>
</html>
