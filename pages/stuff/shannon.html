<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="shannonate entropy">
  <meta name="author" content="narada foxy">

  <link rel="stylesheet" href="/style/style.css">

  <title>shannon's entropy</title>

  <script type="module">
    import { deflang, deftheme } from "/script/locstub.js"

    await deflang("stuff");
    deftheme();

    function getent(str) {
      const t = new TextEncoder();
      const d = t.encode(str);

      if(d.length === 0) return 0;

      const f = new Map();
      for (let i = 0; i < d.length; i++) {
        f.set(d[i], (f.get(d[i]) || 0) + 1);
      }

      let ent = 0;
      for (const c of f.values()) {
        const p = c / d.length;
        ent -= p * Math.log2(p);
      }

      return ent;
    }

    const tx = document.getElementById('in');
    const out = document.getElementById('out');
    const ch = document.getElementById('ch');

    let ent = 0;

    tx.addEventListener('input', () => {
      let k = getent(tx.value);
      let c = k - ent;

      out.textContent = k.toFixed(8);
      
      if(c > 0) {
        ch.style = "color: var(--a)";
        ch.textContent = c.toFixed(8) + " +";
      } else {
        ch.style = "color: var(--blue)";
        ch.textContent = (-c).toFixed(8) + " -";
      }

      ent = k;
    })

  </script>
</head>
<body>
  <div class="main">
    <div class="tbar">
      <p>shannon</p>
      <pre class="link2"><a href="/pages/stuff.html" data-i18n="back">back</a></pre>
    </div>
    
    <div class="dash"></div>
    <div class="sep"></div>
    <p data-i18n="entintro">entropy of shannon</p>
    <div class="sep"></div>
    <textarea placeholder="text here" id="in"></textarea>
    <p><pre data-i18n="entropy">entropy:</pre> <span id="out" class="ok">0.00000000</span> bits per byte</p>
    <p><pre data-i18n="change">change :</pre> <span id="ch" class="ok">0.00000000</span></p>
  </div>
</body> 
</html>
